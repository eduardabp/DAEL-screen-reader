<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Reader Experience - Digital Accessibility Empathy Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .lab-ui-font { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif !important; }
        .info-panel-container { min-height: 550px !important; display: flex; flex-direction: column; }
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ef4444; transition: .4s; border-radius: 28px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #15803d; }
        input:checked + .slider:before { transform: translateX(22px); }
        .tab-btn { font-family: ui-sans-serif, system-ui, sans-serif !important; }
        .tab-btn[aria-selected="true"] { background-color: #111827; color: #60a5fa; border-bottom: 2px solid #60a5fa; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 transition-colors duration-500 lab-ui-font" id="bodyTag">

    <div class="max-w-7xl mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden">
        <header class="bg-white border-b border-gray-100">
            <div class="p-6 flex flex-col md:flex-row justify-between items-center gap-6 border-b border-gray-50">
                <div id="txt-lab-title" class="text-xl md:text-2xl font-black tracking-tight uppercase" style="color: #008B63;">Digital Accessibility Empathy Lab</div>
                <img src="https://regine-lambrecht.github.io/color-contrast-checker-size-weight/images/banner.png" alt="Logo" class="h-12">
            </div>

            <nav class="p-4 flex flex-col gap-4">
                <div class="flex items-center justify-between gap-4 bg-gray-50 p-3 rounded-2xl border border-gray-200 w-full">
                    <div class="flex items-center gap-4">
                        <span id="txt-inaccessible" class="text-xs font-black uppercase tracking-widest text-red-600">Inaccessible</span>
                        <label class="switch">
                            <input type="checkbox" id="modeToggle" onchange="handleModeToggle()" role="switch">
                            <span class="slider"></span>
                        </label>
                        <span id="txt-accessible" class="text-xs font-black uppercase tracking-widest text-green-700">Accessible</span>
                    </div>
                    <div class="flex gap-2 text-[10px] font-bold">
                        <button onclick="setLanguage('en')" class="lang-btn px-2 py-1 rounded" id="btn-en">EN</button>
                        <button onclick="setLanguage('fr')" class="lang-btn px-2 py-1 rounded" id="btn-fr">FR</button>
                        <button onclick="setLanguage('nl')" class="lang-btn px-2 py-1 rounded" id="btn-nl">NL</button>
                        <button onclick="setLanguage('de')" class="lang-btn px-2 py-1 rounded" id="btn-de">DE</button>
                    </div>
                </div>
                <h1 id="txt-title" class="text-xl font-black text-gray-900 px-2 uppercase tracking-tighter">Screen Reader Experience</h1>
            </nav>
        </header>

        <main class="p-6 md:p-10">
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-16">
                <div class="lg:col-span-2 flex flex-col">
                    <div id="error-area" class="mb-6"></div>
                    <div id="dynamic-form-area" class="space-y-6"></div>
                </div>

                <div class="lg:col-span-3">
                    <div class="info-panel-container bg-gray-900 text-white rounded-2xl shadow-xl overflow-hidden h-full flex flex-col">
                        <div class="flex bg-gray-800 border-b border-gray-700">
                            <button id="tab-test" onclick="switchTab('test')" class="tab-btn px-6 py-4 text-xs font-black uppercase tracking-widest" aria-selected="true">How to test</button>
                            <button id="tab-feedback" onclick="switchTab('feedback')" class="tab-btn px-6 py-4 text-xs font-black uppercase tracking-widest border-l border-gray-700" aria-selected="false">Issues</button>
                            <button id="tab-user" onclick="switchTab('user')" class="tab-btn px-6 py-4 text-xs font-black uppercase tracking-widest border-l border-gray-700" aria-selected="false">Impacted users</button>
                        </div>
                        <div id="panel-test" class="p-8 space-y-6 text-sm flex-grow overflow-y-auto">
                            <h3 id="txt-guide-title" class="text-blue-400 font-bold uppercase text-xs mb-2">Step-by-step guide</h3>
                            <ol id="txt-test-steps" class="list-decimal pl-5 space-y-4 opacity-95"></ol>
                        </div>
                        <div id="panel-feedback" class="p-8 hidden text-sm flex-grow overflow-y-auto">
                            <div id="critiqueContent" class="space-y-6"></div>
                        </div>
                        <div id="panel-user" class="p-8 hidden text-sm flex-grow overflow-y-auto">
                            <div id="txt-user-content" class="leading-relaxed opacity-95 text-sm"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const translations = {
            en: {
                labTitle: "Digital Accessibility Empathy Lab", title: "Screen Reader Experience",
                labelName: "Full Name", labelEmail: "Email Address", labelGender: "Gender",
                optMale: "Male", optFemale: "Female", optOther: "Other",
                agreeTerms: "I agree to the Terms and Privacy Policy", btnText: "Register Now",
                tabTest: "How to test", tabIssues: "Issues", tabRemediations: "Remediations", tabUser: "Impacted users",
                guideTitle: "Step-by-step guide",
                testSteps: ["Use a Screen Reader.", "Navigate with the Tab key.", "Try to identify the Email field based on the audio.", "Check the Register button—is it announced as a button?", "Submit an empty form—does your Screen Reader alert you to the error list at the top?"],
                badEmailAria: "Form Field 2", requiredTxt: "(Required)", 
                errHeader: "Please correct the following errors:",
                errName: "Full Name is a required field.",
                errEmail: "Email Address is required and must be a valid format.",
                errGender: "Please select a Gender.",
                errTerms: "You must agree to the Terms.",
                critiques: {
                    bad: { items: [
                        { f: "Vague ARIA Overwrite", c: "The email field uses an aria-label 'Form Field 2'. This overrides the visible name." },
                        { f: "Silent Role", c: "The 'Register' button is a &lt;div&gt;. It lacks a 'button' role and isn't identified as interactive." },
                        { f: "Silent State", c: "The checkbox state is hidden from screen readers; users won't know if it's checked." },
                        { f: "Non-Live Errors", c: "The error list at the top is not in an aria-live region, so it remains silent when it appears." }
                    ]},
                    good: { items: [
                        { f: "Accessible Naming", c: "Native labels and descriptions ensure the field's purpose is clear." },
                        { f: "Semantic Elements", c: "Using &lt;button&gt; and &lt;fieldset&gt; provides automatic role and grouping." },
                        { f: "Programmatic State", c: "aria-required and standard inputs communicate state and necessity correctly." },
                        { f: "Live Region Alerts", c: "role='alert' ensures the error list is announced as soon as it appears." }
                    ]}
                },
                userTitle: "Who is impacted?", userList: ["**Blind Users:** Cannot identify vague fields or know when errors appear at the top.", "**Keyboard Users:** Can reach the div button but lack context on its function.", "**Cognitive Impairment:** Benefit from clear, predictable error summaries."],
                successMsg: "Success! You are registered."
            },
            fr: {
                labTitle: "Labo d'empathie sur l'accessibilité", title: "Expérience Lecteur d'écran",
                labelName: "Nom complet", labelEmail: "Adresse e-mail", labelGender: "Genre",
                optMale: "Homme", optFemale: "Femme", optOther: "Autre",
                agreeTerms: "J'accepte les conditions générales", btnText: "S'inscrire maintenant",
                tabTest: "Comment tester", tabIssues: "Problèmes", tabRemediations: "Corrections", tabUser: "Utilisateurs impactés",
                guideTitle: "Guide étape par étape",
                testSteps: ["Utilisez un lecteur d'écran.", "Naviguez avec Tab.", "Identifiez le champ Email via l'audio.", "Vérifiez si le bouton S'inscrire est annoncé.", "Validez à vide : l'erreur est-elle lue automatiquement ?"],
                badEmailAria: "Champ de formulaire 2", requiredTxt: "(Obligatoire)",
                errHeader: "Veuillez corriger les erreurs suivantes :",
                errName: "Le nom complet est obligatoire.",
                errEmail: "L'e-mail est obligatoire et doit être valide.",
                errGender: "Veuillez choisir un genre.",
                errTerms: "Vous devez accepter les conditions.",
                critiques: {
                    bad: { items: [
                        { f: "Écrasement ARIA vague", c: "Le champ e-mail utilise 'Champ 2', effaçant le nom visible." },
                        { f: "Rôle muet", c: "Le bouton est un &lt;div&gt;. Sans rôle, son but n'est pas communiqué." },
                        { f: "État silencieux", c: "L'état de la case est masqué; l'utilisateur ne sait pas s'il a coché." },
                        { f: "Erreurs non-interrompues", c: "La liste d'erreurs en haut n'est pas annoncée car elle manque d'aria-live." }
                    ]},
                    good: { items: [
                        { f: "Nommage accessible", c: "Les labels natifs garantissent une identification claire." },
                        { f: "Éléments sémantiques", c: "L'usage de &lt;button&gt; et &lt;fieldset&gt; gère les rôles automatiquement." },
                        { f: "États programmatiques", c: "aria-required et les inputs standards communiquent l'état correctement." },
                        { f: "Alertes en direct", c: "role='alert' force la lecture de la liste d'erreurs dès son apparition." }
                    ]}
                },
                userTitle: "Qui est impacté ?", userList: ["**Utilisateurs aveugles:** Ne peuvent pas identifier les champs vagues ou voir les erreurs en haut.", "**Utilisateurs clavier:** Confus par des éléments sans rôle.", "**Troubles cognitifs:** Ont besoin de résumés d'erreurs clairs."],
                successMsg: "Succès ! Vous êtes inscrit."
            },
            nl: {
                labTitle: "Toegankelijkheid Empathy Lab", title: "Schermlezer Ervaring",
                labelName: "Volledige Naam", labelEmail: "E-mailadres", labelGender: "Geslacht",
                optMale: "Man", optFemale: "Vrouw", optOther: "Anders",
                agreeTerms: "Ik ga akkoord met de voorwaarden", btnText: "Nu Registreren",
                tabTest: "Hoe te testen", tabIssues: "Problemen", tabRemediations: "Oplossingen", tabUser: "Impact op gebruikers",
                guideTitle: "Stappenplan",
                testSteps: ["Gebruik een schermlezer.", "Navigeer met Tab.", "Identificeer het e-mailveld via de audio.", "Wordt de registratieknop herkend?", "Verstuur een leeg formulier: hoor je de foutenlijst bovenin?"],
                badEmailAria: "Formulierveld 2", requiredTxt: "(Verplicht)",
                errHeader: "Corrigeer de volgende fouten:",
                errName: "Volledige Naam is verplicht.",
                errEmail: "E-mailadres is verplicht en moet geldig zijn.",
                errGender: "Selecteer een geslacht.",
                errTerms: "U moet akkoord gaan met de voorwaarden.",
                critiques: {
                    bad: { items: [
                        { f: "Vage ARIA Overschrijving", c: "E-mailveld gebruikt 'Formulierveld 2', wat de naam wist." },
                        { f: "Stille Rol", c: "De knop is een &lt;div&gt; zonder rolvermelding." },
                        { f: "Stille Status", c: "De status van de checkbox is verborgen voor de lezer." },
                        { f: "Geen Live Meldingen", c: "De foutenlijst bovenin wordt niet automatisch voorgelezen." }
                    ]},
                    good: { items: [
                        { f: "Toegankelijke Naamgeving", c: "Native labels zorgen voor duidelijke identificatie." },
                        { f: "Semantische Elementen", c: "&lt;button&gt; en &lt;fieldset&gt; bieden automatische rollen." },
                        { f: "Programmatische Status", c: "aria-required en standaard inputs melden status correct." },
                        { f: "Live Regio Alerts", c: "role='alert' meldt de foutenlijst direct." }
                    ]}
                },
                userTitle: "Wie wordt beïnvloed?", userList: ["**Blinde gebruikers:** Missen foutmeldingen die bovenin verschijnen.", "**Toetsenbordgebruikers:** Verward door knoppen zonder rol.", "**Cognitieve beperking:** Hebben baat bij foutsamenvattingen."],
                successMsg: "Succes! U bent geregistreerd."
            },
            de: {
                labTitle: "Barrierefreiheits-Empathie-Labor", title: "Screenreader-Erfahrung",
                labelName: "Vollständiger Name", labelEmail: "E-Mail-Adresse", labelGender: "Geschlecht",
                optMale: "Männlich", optFemale: "Weiblich", optOther: "Andere",
                agreeTerms: "Ich stimme den Bedingungen zu", btnText: "Jetzt Registrieren",
                tabTest: "Wie man testet", tabIssues: "Probleme", tabRemediations: "Lösungen", tabUser: "Betroffene Nutzer",
                guideTitle: "Schritt-für-Schritt-Anleitung",
                testSteps: ["Nutzen Sie einen Screenreader.", "Navigieren Sie mit Tab.", "Identifizieren Sie das E-Mail-Feld via Audio.", "Wird der Button erkannt?", "Formular leer absenden: wird die Fehlerliste oben angesagt?"],
                badEmailAria: "Formularfeld 2", requiredTxt: "(Erforderlich)",
                errHeader: "Bitte korrigieren Sie folgende Fehler:",
                errName: "Vollständiger Name ist erforderlich.",
                errEmail: "E-Mail ist erforderlich und muss gültig sein.",
                errGender: "Bitte wählen Sie ein Geschlecht.",
                errTerms: "Sie müssen den Bedingungen zustimmen.",
                critiques: {
                    bad: { items: [
                        { f: "Vage ARIA-Überschreibung", c: "E-Mail-Feld nutzt 'Formularfeld 2' und löscht den echten Namen." },
                        { f: "Stumme Rolle", c: "Der Button ist ein &lt;div&gt; ohne Rollen-Ansage." },
                        { f: "Stummer Status", c: "Der Status der Checkbox wird nicht übertragen." },
                        { f: "Keine Live-Meldungen", c: "Die Fehlerliste oben wird ohne aria-live nicht angesagt." }
                    ]},
                    good: { items: [
                        { f: "Barrierefreie Benennung", c: "Native Labels sichern die richtige Ansage." },
                        { f: "Semantische Elemente", c: "&lt;button&gt; und &lt;fieldset&gt; bieten automatische Rollen." },
                        { f: "Programmatischer Status", c: "aria-required meldet Notwendigkeit korrekt." },
                        { f: "Live-Region-Alerts", c: "role='alert' liest Fehler sofort vor." }
                    ]}
                },
                userTitle: "Wer ist betroffen?", userList: ["**Blinde Nutzer:** Übersehen Fehlerlisten am Seitenanfang.", "**Tastaturnutzer:** Verwirrt durch interaktive Elemente ohne Rolle.", "**Kognitive Einschränkung:** Profitieren von Fehlerzusammenfassungen."],
                successMsg: "Erfolg! Sie sind registriert."
            }
        };

        let currentLang = 'en';

        function renderForm() {
            const isAcc = document.getElementById('modeToggle').checked;
            const t = translations[currentLang] || translations['en'];
            const container = document.getElementById('dynamic-form-area');
            document.getElementById('error-area').innerHTML = "";
            
            if (isAcc) {
                container.innerHTML = `
                    <div class="space-y-6">
                        <div>
                            <label for="acc-name" class="block mb-1 text-sm font-bold text-gray-700">${t.labelName} <span class="text-gray-500 font-normal">${t.requiredTxt}</span></label>
                            <input type="text" id="acc-name" aria-required="true" class="w-full border border-gray-300 p-2 rounded-lg bg-gray-50 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                        </div>
                        <div>
                            <label for="acc-email" class="block mb-1 text-sm font-bold text-gray-700">${t.labelEmail} <span class="text-gray-500 font-normal">${t.requiredTxt}</span></label>
                            <input type="email" id="acc-email" aria-required="true" class="w-full border border-gray-300 p-2 rounded-lg bg-gray-50 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                        </div>
                        <fieldset class="border border-gray-200 p-4 rounded-lg">
                            <legend class="px-2 text-sm font-bold text-gray-700">${t.labelGender} <span class="text-gray-500 font-normal">${t.requiredTxt}</span></legend>
                            <div class="flex gap-4">
                                <label class="flex items-center text-sm cursor-pointer"><input type="radio" name="gender" aria-required="true" class="mr-2"> ${t.optMale}</label>
                                <label class="flex items-center text-sm cursor-pointer"><input type="radio" name="gender" class="mr-2"> ${t.optFemale}</label>
                                <label class="flex items-center text-sm cursor-pointer"><input type="radio" name="gender" class="mr-2"> ${t.optOther}</label>
                            </div>
                        </fieldset>
                        <div class="flex items-center">
                            <input type="checkbox" id="acc-terms" aria-required="true" class="w-4 h-4 mr-2">
                            <label for="acc-terms" class="text-sm font-medium text-gray-700">${t.agreeTerms}</label>
                        </div>
                        <button onclick="validateForm(true)" class="w-full bg-green-700 text-white font-bold py-3 rounded-lg uppercase hover:bg-green-800 transition-colors">${t.btnText}</button>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="space-y-6">
                        <div>
                            <div class="text-sm font-bold text-gray-700 mb-1">${t.labelName} <span class="text-gray-500 font-normal">${t.requiredTxt}</span></div>
                            <input type="text" class="w-full border border-gray-300 p-2 rounded-lg bg-gray-50 text-sm focus:outline-none">
                        </div>
                        <div>
                            <div class="text-sm font-bold text-gray-700 mb-1">${t.labelEmail} <span class="text-gray-500 font-normal">${t.requiredTxt}</span></div>
                            <input type="text" aria-label="${t.badEmailAria}" class="w-full border border-gray-300 p-2 rounded-lg bg-gray-50 text-sm focus:outline-none">
                        </div>
                        <div class="border border-gray-200 p-4 rounded-lg relative mt-6">
                            <div class="absolute -top-3 left-2 bg-white px-2 text-sm font-bold text-gray-700">${t.labelGender} <span class="text-gray-500 font-normal">${t.requiredTxt}</span></div>
                            <div class="flex gap-4 pt-2">
                                <label class="flex items-center text-sm"><input type="radio" name="bad-gender" class="mr-2"> ${t.optMale}</label>
                                <label class="flex items-center text-sm"><input type="radio" name="bad-gender" class="mr-2"> ${t.optFemale}</label>
                                <label class="flex items-center text-sm"><input type="radio" name="bad-gender" class="mr-2"> ${t.optOther}</label>
                            </div>
                        </div>
                        <div class="flex items-center">
                            <label class="flex items-center text-sm font-medium text-gray-700">
                                <input type="checkbox" aria-hidden="true" class="w-4 h-4 mr-2">
                                <span>${t.agreeTerms}</span>
                            </label>
                        </div>
                        <div tabindex="0" id="bad-btn" class="w-full bg-green-700 text-white font-bold py-3 rounded-lg uppercase text-center cursor-pointer hover:bg-green-800 transition-colors">
                            ${t.btnText}
                        </div>
                    </div>
                `;
                const badBtn = document.getElementById('bad-btn');
                badBtn.addEventListener('click', () => validateForm(false));
                badBtn.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        validateForm(false);
                    }
                });
            }
        }

        function validateForm(isAcc) {
            const errArea = document.getElementById('error-area');
            const t = translations[currentLang] || translations['en'];
            
            errArea.innerHTML = `
                <div ${isAcc ? 'role="alert"' : ''} class="p-4 rounded-lg border-2 border-red-200 bg-red-50 text-red-800">
                    <p class="font-bold mb-2">${t.errHeader}</p>
                    <ul class="list-disc pl-5 text-sm space-y-1">
                        <li>${t.errName}</li>
                        <li>${t.errEmail}</li>
                        <li>${t.errGender}</li>
                        <li>${t.errTerms}</li>
                    </ul>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang] || translations['en'];
            const isAcc = document.getElementById('modeToggle').checked;
            document.getElementById('txt-lab-title').innerText = t.labTitle;
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('tab-test').innerText = t.tabTest;
            document.getElementById('tab-user').innerText = t.tabUser;
            document.getElementById('tab-feedback').innerText = isAcc ? t.tabRemediations : t.tabIssues;
            document.getElementById('txt-guide-title').innerText = t.guideTitle;
            document.getElementById('txt-test-steps').innerHTML = t.testSteps.map(s => `<li>${s}</li>`).join('');
            const crit = isAcc ? t.critiques.good : t.critiques.bad;
            document.getElementById('critiqueContent').innerHTML = crit.items.map(i => `<div><span class="text-blue-400 font-bold block mb-1 uppercase text-[11px]">${i.f}</span><p class="text-white opacity-90">${i.c}</p></div>`).join('');
            document.getElementById('txt-user-content').innerHTML = `
                <h3 class="text-blue-400 font-bold uppercase mb-4 text-xs">${t.userTitle}</h3>
                <ul class="list-disc pl-5 space-y-3">${t.userList.map(li => `<li>${li.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')}</li>`).join('')}</ul>
            `;
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white', 'bg-gray-200', 'text-gray-700');
                if (b.id === 'btn-' + lang) b.classList.add('bg-blue-600', 'text-white');
                else b.classList.add('bg-gray-200', 'text-gray-700');
            });
            renderForm();
        }

        function handleModeToggle() { setLanguage(currentLang); }
        function switchTab(tabId) {
            ['test', 'feedback', 'user'].forEach(id => {
                document.getElementById('panel-' + id).classList.toggle('hidden', id !== tabId);
                document.getElementById('tab-' + id).setAttribute('aria-selected', id === tabId);
            });
        }
        setLanguage('en');
    </script>
</body>
</html>
