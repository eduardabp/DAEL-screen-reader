<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Reader Experience - Digital Accessibility Empathy Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .lab-ui-font { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif !important; }
        .info-panel-container { min-height: 550px !important; display: flex; flex-direction: column; }
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ef4444; transition: .4s; border-radius: 28px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #15803d; }
        input:checked + .slider:before { transform: translateX(22px); }
        .tab-btn { font-family: ui-sans-serif, system-ui, sans-serif !important; }
        .tab-btn[aria-selected="true"] { background-color: #111827; color: #60a5fa; border-bottom: 2px solid #60a5fa; }
        .input-border { border: 1.5px solid #000000 !important; }
        .custom-cb { width: 1.25rem; height: 1.25rem; border: 2px solid #000; border-radius: 4px; position: relative; display: inline-block; vertical-align: middle; background: white; cursor: pointer; }
        .custom-cb.checked::after { content: '✓'; position: absolute; top: -2px; left: 2px; font-weight: bold; color: #15803d; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 transition-colors duration-500 lab-ui-font" id="bodyTag">

    <div class="max-w-7xl mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden">
        <header class="bg-white border-b border-gray-100">
            <div class="p-6 flex flex-col md:flex-row justify-between items-center gap-6 border-b border-gray-50">
                <div id="txt-lab-title" class="text-xl md:text-2xl font-black tracking-tight uppercase" style="color: #008B63;">Digital Accessibility Empathy Lab</div>
                <img src="https://regine-lambrecht.github.io/color-contrast-checker-size-weight/images/banner.png" alt="Logo" class="h-12">
            </div>

            <nav class="p-4 flex flex-col gap-4">
                <div class="flex items-center justify-between gap-4 bg-gray-50 p-3 rounded-2xl border border-gray-200 w-full">
                    <div class="flex items-center gap-4">
                        <span id="txt-inaccessible" class="text-xs font-black uppercase tracking-widest text-red-600">Inaccessible</span>
                        <label class="switch">
                            <input type="checkbox" id="modeToggle" onchange="handleModeToggle()" role="switch">
                            <span class="slider"></span>
                        </label>
                        <span id="txt-accessible" class="text-xs font-black uppercase tracking-widest text-green-700">Accessible</span>
                    </div>
                    <div class="flex gap-2 text-[10px] font-bold">
                        <button onclick="setLanguage('en')" class="lang-btn px-2 py-1 rounded" id="btn-en">EN</button>
                        <button onclick="setLanguage('fr')" class="lang-btn px-2 py-1 rounded" id="btn-fr">FR</button>
                        <button onclick="setLanguage('nl')" class="lang-btn px-2 py-1 rounded" id="btn-nl">NL</button>
                        <button onclick="setLanguage('de')" class="lang-btn px-2 py-1 rounded" id="btn-de">DE</button>
                    </div>
                </div>
                <h1 id="txt-title" class="text-xl font-black text-gray-900 px-2 uppercase tracking-tighter">Screen Reader Experience</h1>
            </nav>
        </header>

        <main class="p-6 md:p-10">
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-16">
                <div class="lg:col-span-2 flex flex-col">
                    <div id="error-area" class="mb-6 min-h-[50px]"></div>
                    <div id="dynamic-form-area" class="space-y-6"></div>
                </div>

                <div class="lg:col-span-3">
                    <div class="info-panel-container bg-gray-900 text-white rounded-2xl shadow-xl overflow-hidden h-full flex flex-col">
                        <div class="flex bg-gray-800 border-b border-gray-700">
                            <button id="tab-test" onclick="switchTab('test')" class="tab-btn px-6 py-4 text-xs font-black uppercase tracking-widest" aria-selected="true">How to test</button>
                            <button id="tab-feedback" onclick="switchTab('feedback')" class="tab-btn px-6 py-4 text-xs font-black uppercase tracking-widest border-l border-gray-700" aria-selected="false">Issues</button>
                            <button id="tab-user" onclick="switchTab('user')" class="tab-btn px-6 py-4 text-xs font-black uppercase tracking-widest border-l border-gray-700" aria-selected="false">Impacted users</button>
                        </div>
                        <div id="panel-test" class="p-8 space-y-6 text-sm flex-grow overflow-y-auto">
                            <h3 id="txt-guide-title" class="text-blue-400 font-bold uppercase text-xs mb-2">Step-by-step guide</h3>
                            <ol id="txt-test-steps" class="list-decimal pl-5 space-y-4 opacity-95"></ol>
                        </div>
                        <div id="panel-feedback" class="p-8 hidden text-sm flex-grow overflow-y-auto">
                            <div id="critiqueContent" class="space-y-6"></div>
                        </div>
                        <div id="panel-user" class="p-8 hidden text-sm flex-grow overflow-y-auto">
                            <div id="txt-user-content" class="leading-relaxed opacity-95 text-sm"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const translations = {
            en: {
                labTitle: "Digital Accessibility Empathy Lab", title: "Screen Reader Experience",
                labelName: "Full Name", labelEmail: "Email Address", labelGender: "Gender",
                optMale: "Male", optFemale: "Female", optOther: "Other",
                agreeTerms: "I agree to the Terms and Privacy Policy", btnText: "Register Now",
                tabTest: "How to test", tabIssues: "Issues", tabRemediations: "Remediations", tabUser: "Impacted users",
                guideTitle: "Step-by-step guide",
                testSteps: ["Use a Screen Reader.", "Navigate with the Tab key.", "Tab to the Checkbox—notice if 'checked' is announced when you press Space.", "Enter an invalid email and submit—check if errors appear at the top and if they are announced."],
                badEmailAria: "Form Field 2", requiredTxt: "(Required)", 
                errHeader: "Please correct the following errors:",
                errNameReq: "Full Name is required.",
                errEmailReq: "Email Address is required.",
                errEmailFormat: "Email Address format is invalid.",
                errGenderReq: "Please select a Gender.",
                errTermsReq: "You must agree to the terms.",
                critiques: {
                    bad: { items: [
                        { f: "Vague ARIA Overwrite", c: "Email uses 'aria-label' which wipes out the visible label name." },
                        { f: "Silent State", c: "The custom checkbox has a role but no 'aria-checked' attribute, so its state is never read." },
                        { f: "Non-Live Errors", c: "The error list at the top is visual only and not announced to screen readers." }
                    ]},
                    good: { items: [
                        { f: "Semantic States", c: "aria-required and native checkboxes communicate state and necessity correctly." },
                        { f: "High Contrast", c: "Black borders (#000000) ensure a 3:1 contrast ratio." },
                        { f: "Live Region Alerts", c: "role='alert' ensures immediate error announcement." }
                    ]}
                },
                userTitle: "Who is impacted?", userList: ["**Blind Users:** Cannot know if a checkbox is checked without aria-checked.", "**Low Vision Users:** Benefit from high-contrast borders.", "**Screen Reader Users:** Rely on live regions for error summaries."],
            },
            fr: {
                labTitle: "Labo d'empathie sur l'accessibilité", title: "Expérience Lecteur d'écran",
                labelName: "Nom complet", labelEmail: "Adresse e-mail", labelGender: "Genre",
                optMale: "Homme", optFemale: "Femme", optOther: "Autre",
                agreeTerms: "J'accepte les conditions", btnText: "S'inscrire",
                tabTest: "Comment tester", tabIssues: "Problèmes", tabRemediations: "Corrections", tabUser: "Utilisateurs impactés",
                guideTitle: "Guide étape par étape",
                testSteps: ["Utilisez un lecteur d'écran.", "Naviguez avec Tab.", "Cochez la case : l'état 'coché' est-il annoncé ?", "Validez avec un e-mail erroné : l'erreur est-elle lue ?"],
                badEmailAria: "Champ 2", requiredTxt: "(Obligatoire)", 
                errHeader: "Veuillez corriger les erreurs :",
                errNameReq: "Le nom est obligatoire.",
                errEmailReq: "L'e-mail est obligatoire.",
                errEmailFormat: "Le format de l'e-mail est invalide.",
                errGenderReq: "Veuillez choisir un genre.",
                errTermsReq: "Vous devez accepter les conditions.",
                critiques: {
                    bad: { items: [
                        { f: "Écrasement ARIA", c: "L'aria-label sur l'e-mail efface le nom du champ." },
                        { f: "État muet", c: "La case personnalisée n'a pas d'aria-checked." },
                        { f: "Erreurs non-annoncées", c: "La liste d'erreurs n'est pas dans une zone live." }
                    ]},
                    good: { items: [
                        { f: "États sémantiques", c: "aria-required et les cases natives communiquent tout." },
                        { f: "Contraste élevé", c: "Bordures noires pour un ratio de 3:1." },
                        { f: "Alertes directes", c: "role='alert' annonce les erreurs immédiatement." }
                    ]}
                },
                userTitle: "Qui est impacté ?", userList: ["**Aveugles:** Dépendent de l'aria-checked.", "**Malvoyants:** Profitent des bordures contrastées.", "**Lecteurs d'écran:** Ont besoin d'alertes pour les erreurs."],
            },
            nl: {
                labTitle: "Toegankelijkheid Empathy Lab", title: "Schermlezer Ervaring",
                labelName: "Naam", labelEmail: "E-mailadres", labelGender: "Geslacht",
                optMale: "Man", optFemale: "Vrouw", optOther: "Anders",
                agreeTerms: "Ik ga akkoord", btnText: "Registreren",
                tabTest: "Hoe te testen", tabIssues: "Problemen", tabRemediations: "Oplossingen", tabUser: "Impact",
                guideTitle: "Stappenplan",
                testSteps: ["Gebruik een schermlezer.", "Navigeer met Tab.", "Vink de checkbox aan: hoor je 'aangevinkt'?", "Verstuur foutieve e-mail: wordt de fout bovenin gemeld?"],
                badEmailAria: "Veld 2", requiredTxt: "(Verplicht)", 
                errHeader: "Corrigeer de volgende fouten:",
                errNameReq: "Naam is verplicht.",
                errEmailReq: "E-mail is verplicht.",
                errEmailFormat: "E-mail formaat is ongeldig.",
                errGenderReq: "Selecteer een geslacht.",
                errTermsReq: "Ga akkoord met de voorwaarden.",
                critiques: {
                    bad: { items: [
                        { f: "ARIA Overschrijving", c: "Aria-label wist de zichtbare labelnaam van het e-mailveld." },
                        { f: "Stille Status", c: "De checkbox mist aria-checked." },
                        { f: "Geen Live Meldingen", c: "Foutenlijst wordt niet automatisch voorgelezen." }
                    ]},
                    good: { items: [
                        { f: "Semantiek", c: "Native inputs melden status en verplichting correct." },
                        { f: "Hoog Contrast", c: "Zwarte randen voor 3:1 contrast." },
                        { f: "Live Regio's", c: "role='alert' meldt fouten direct." }
                    ]}
                },
                userTitle: "Wie wordt beïnvloed?", userList: ["**Blinden:** Hebben aria-checked nodig.", "**Slechtzienden:** Gebruiken de zwarte randen.", "**Schermlezers:** Vertrouwen op live regio's."],
            },
            de: {
                labTitle: "Barrierefreiheits-Empathie-Labor", title: "Screenreader-Erfahrung",
                labelName: "Name", labelEmail: "E-Mail", labelGender: "Geschlecht",
                optMale: "Männlich", optFemale: "Weiblich", optOther: "Andere",
                agreeTerms: "Ich stimme zu", btnText: "Registrieren",
                tabTest: "Testanleitung", tabIssues: "Probleme", tabRemediations: "Lösungen", tabUser: "Auswirkung",
                guideTitle: "Schritt-für-Schritt",
                testSteps: ["Nutzen Sie einen Screenreader.", "Navigieren Sie mit Tab.", "Checkbox prüfen: wird 'ausgewählt' angesagt?", "E-Mail-Fehler provozieren: wird die Liste oben vorgelesen?"],
                badEmailAria: "Feld 2", requiredTxt: "(Erforderlich)", 
                errHeader: "Bitte korrigieren Sie:",
                errNameReq: "Name ist erforderlich.",
                errEmailReq: "E-Mail ist erforderlich.",
                errEmailFormat: "E-Mail-Format ist ungültig.",
                errGenderReq: "Wählen Sie ein Geschlecht.",
                errTermsReq: "Zustimmung ist erforderlich.",
                critiques: {
                    bad: { items: [
                        { f: "ARIA-Überschreibung", c: "Das aria-label löscht den sichtbaren Namen des E-Mail-Felds." },
                        { f: "Stummer Status", c: "Checkbox ohne aria-checked bleibt im Unklaren." },
                        { f: "Keine Live-Meldung", c: "Fehlerliste oben wird nicht automatisch angesagt." }
                    ]},
                    good: { items: [
                        { f: "Semantik", c: "Native Inputs melden Status und Pflichtfelder korrekt." },
                        { f: "Hoher Kontrast", c: "Schwarze Ränder für 3:1 Kontrast." },
                        { f: "Live-Regionen", c: "role='alert' meldet Fehler sofort." }
                    ]}
                },
                userTitle: "Wer ist betroffen?", userList: ["**Blinde:** Benötigen aria-checked.", "**Sehbehinderte:** Nutzen kontrastreiche Ränder.", "**Screenreader:** Brauchen Live-Regionen für Fehler."],
            }
        };

        let currentLang = 'en';

        function renderForm() {
            const isAcc = document.getElementById('modeToggle').checked;
            const t = translations[currentLang] || translations['en'];
            const container = document.getElementById('dynamic-form-area');
            document.getElementById('error-area').innerHTML = "";
            
            if (isAcc) {
                container.innerHTML = `
                    <div class="space-y-6">
                        <div>
                            <label for="f-name" class="block mb-1 text-sm font-bold text-gray-700">${t.labelName} <span class="text-gray-500 font-normal">${t.requiredTxt}</span></label>
                            <input type="text" id="f-name" aria-required="true" class="w-full input-border p-2 rounded-lg bg-gray-50 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                        </div>
                        <div>
                            <label for="f-email" class="block mb-1 text-sm font-bold text-gray-700">${t.labelEmail} <span class="text-gray-500 font-normal">${t.requiredTxt}</span></label>
                            <input type="text" id="f-email" aria-required="true" class="w-full input-border p-2 rounded-lg bg-gray-50 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                        </div>
                        <fieldset class="border border-gray-200 p-4 rounded-lg">
                            <legend class="px-2 text-sm font-bold text-gray-700">${t.labelGender} <span class="text-gray-500 font-normal">${t.requiredTxt}</span></legend>
                            <div class="flex gap-4">
                                <label class="flex items-center text-sm"><input type="radio" name="g" aria-required="true" class="mr-2"> ${t.optMale}</label>
                                <label class="flex items-center text-sm"><input type="radio" name="g" class="mr-2"> ${t.optFemale}</label>
                                <label class="flex items-center text-sm"><input type="radio" name="g" class="mr-2"> ${t.optOther}</label>
                            </div>
                        </fieldset>
                        <div class="flex items-center">
                            <input type="checkbox" id="f-terms" aria-required="true" class="w-4 h-4 mr-2 border-black">
                            <label for="f-terms" class="text-sm font-medium text-gray-700 cursor-pointer">${t.agreeTerms}</label>
                        </div>
                        <button onclick="validateForm(true)" class="w-full bg-green-700 text-white font-bold py-3 rounded-lg uppercase hover:bg-green-800">${t.btnText}</button>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="space-y-6">
                        <div>
                            <div class="text-sm font-bold text-gray-700 mb-1">${t.labelName} <span class="text-gray-500 font-normal">${t.requiredTxt}</span></div>
                            <input type="text" id="bad-name" class="w-full input-border p-2 rounded-lg bg-gray-50 text-sm outline-none">
                        </div>
                        <div>
                            <div class="text-sm font-bold text-gray-700 mb-1">${t.labelEmail} <span class="text-gray-500 font-normal">${t.requiredTxt}</span></div>
                            <input type="text" id="bad-email" aria-label="${t.badEmailAria}" class="w-full input-border p-2 rounded-lg bg-gray-50 text-sm outline-none">
                        </div>
                        <div class="input-border p-4 rounded-lg relative mt-6">
                            <div class="absolute -top-3 left-2 bg-white px-2 text-sm font-bold text-gray-700">${t.labelGender} <span class="text-gray-500 font-normal">${t.requiredTxt}</span></div>
                            <div class="flex gap-4 pt-2">
                                <label class="flex items-center text-sm"><input type="radio" name="bg" class="mr-2"> ${t.optMale}</label>
                                <label class="flex items-center text-sm"><input type="radio" name="bg" class="mr-2"> ${t.optFemale}</label>
                                <label class="flex items-center text-sm"><input type="radio" name="bg" class="mr-2"> ${t.optOther}</label>
                            </div>
                        </div>
                        <div class="flex items-center">
                            <div id="custom-check" role="checkbox" tabindex="0" class="custom-cb mr-2" aria-labelledby="cb-label"></div>
                            <span id="cb-label" class="text-sm font-medium text-gray-700 cursor-pointer">${t.agreeTerms}</span>
                        </div>
                        <div tabindex="0" id="bad-btn" class="w-full bg-green-700 text-white font-bold py-3 rounded-lg uppercase text-center cursor-pointer hover:bg-green-800 transition-colors">
                            ${t.btnText}
                        </div>
                    </div>
                `;
                setupBadFormListeners();
            }
        }

        function setupBadFormListeners() {
            const cb = document.getElementById('custom-check');
            const lbl = document.getElementById('cb-label');
            if(!cb) return;
            const toggle = () => cb.classList.toggle('checked');
            cb.onclick = toggle;
            lbl.onclick = toggle;
            cb.onkeydown = (e) => { if (e.key === ' ') { e.preventDefault(); toggle(); } };
            
            const btn = document.getElementById('bad-btn');
            btn.onclick = () => validateForm(false);
            btn.onkeydown = (e) => { if (e.key === 'Enter') validateForm(false); };
        }

        function validateForm(isAcc) {
            const t = translations[currentLang] || translations['en'];
            const emailVal = isAcc ? document.getElementById('f-email').value : document.getElementById('bad-email').value;
            const nameVal = isAcc ? document.getElementById('f-name').value : document.getElementById('bad-name').value;
            
            let errors = [];
            if (!nameVal) errors.push(t.errNameReq);
            if (!emailVal) {
                errors.push(t.errEmailReq);
            } else if (!/^\S+@\S+\.\S+$/.test(emailVal)) {
                errors.push(t.errEmailFormat);
            }
            // Always show others for demo
            errors.push(t.errGenderReq, t.errTermsReq);

            const errArea = document.getElementById('error-area');
            errArea.innerHTML = `
                <div ${isAcc ? 'role="alert"' : ''} class="p-4 rounded-lg border-2 border-red-300 bg-red-50 text-red-900">
                    <p class="font-bold mb-2">${t.errHeader}</p>
                    <ul class="list-disc pl-5 text-sm space-y-1">
                        ${errors.map(e => `<li>${e}</li>`).join('')}
                    </ul>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            const isAcc = document.getElementById('modeToggle').checked;
            document.getElementById('txt-lab-title').innerText = t.labTitle;
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('tab-test').innerText = t.tabTest;
            document.getElementById('tab-user').innerText = t.tabUser;
            document.getElementById('tab-feedback').innerText = isAcc ? t.tabRemediations : t.tabIssues;
            document.getElementById('txt-guide-title').innerText = t.guideTitle;
            document.getElementById('txt-test-steps').innerHTML = t.testSteps.map(s => `<li>${s}</li>`).join('');
            const crit = isAcc ? t.critiques.good : t.critiques.bad;
            document.getElementById('critiqueContent').innerHTML = crit.items.map(i => `<div><span class="text-blue-400 font-bold block mb-1 uppercase text-[11px]">${i.f}</span><p class="text-white opacity-90">${i.c}</p></div>`).join('');
            document.getElementById('txt-user-content').innerHTML = `
                <h3 class="text-blue-400 font-bold uppercase mb-4 text-xs">${t.userTitle}</h3>
                <ul class="list-disc pl-5 space-y-3">${t.userList.map(li => `<li>${li.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')}</li>`).join('')}</ul>
            `;
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.toggle('bg-blue-600', b.id === 'btn-' + lang);
                b.classList.toggle('text-white', b.id === 'btn-' + lang);
                b.classList.toggle('bg-gray-200', b.id !== 'btn-' + lang);
            });
            renderForm();
        }

        function handleModeToggle() { setLanguage(currentLang); }
        function switchTab(tabId) {
            ['test', 'feedback', 'user'].forEach(id => {
                document.getElementById('panel-' + id).classList.toggle('hidden', id !== tabId);
                document.getElementById('tab-' + id).setAttribute('aria-selected', id === tabId);
            });
        }
        setLanguage('en');
    </script>
</body>
</html>
