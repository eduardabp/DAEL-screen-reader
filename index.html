<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Reader Experience - Digital Accessibility Empathy Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .lab-ui-font { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif !important; }
        .info-panel-container { min-height: 550px !important; display: flex; flex-direction: column; }
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ef4444; transition: .4s; border-radius: 28px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #15803d; }
        input:checked + .slider:before { transform: translateX(22px); }
        .tab-btn { font-family: ui-sans-serif, system-ui, sans-serif !important; }
        .tab-btn[aria-selected="true"] { background-color: #111827; color: #60a5fa; border-bottom: 2px solid #60a5fa; }
        .std-border { border: 1px solid #000000 !important; }
        .custom-cb { width: 1.1rem; height: 1.1rem; border: 1px solid #000; border-radius: 2px; position: relative; display: inline-block; vertical-align: middle; background: white; cursor: pointer; }
        .custom-cb.checked::after { content: '✓'; position: absolute; top: -4px; left: 2px; font-weight: bold; color: #15803d; font-size: 14px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 transition-colors duration-500 lab-ui-font">

    <div class="max-w-7xl mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden">
        <header class="bg-white border-b border-gray-100">
            <div class="p-6 flex flex-col md:flex-row justify-between items-center gap-6 border-b border-gray-50">
                <div id="txt-lab-title" class="text-xl md:text-2xl font-black tracking-tight uppercase" style="color: #008B63;">Digital Accessibility Empathy Lab</div>
                <img src="https://regine-lambrecht.github.io/color-contrast-checker-size-weight/images/banner.png" alt="Logo" class="h-12">
            </div>

            <nav class="p-4 flex flex-col gap-4">
                <div class="flex items-center justify-between gap-4 bg-gray-50 p-3 rounded-2xl border border-gray-200 w-full">
                    <div class="flex items-center gap-4">
                        <span id="txt-inaccessible" class="text-xs font-black uppercase tracking-widest text-red-600">Inaccessible</span>
                        <label class="switch">
                            <input type="checkbox" id="modeToggle" onchange="handleModeToggle()" role="switch">
                            <span class="slider"></span>
                        </label>
                        <span id="txt-accessible" class="text-xs font-black uppercase tracking-widest text-green-700">Accessible</span>
                    </div>
                    <div class="flex gap-2 text-[10px] font-bold">
                        <button onclick="setLanguage('en')" class="lang-btn px-2 py-1 rounded" id="btn-en">EN</button>
                        <button onclick="setLanguage('fr')" class="lang-btn px-2 py-1 rounded" id="btn-fr">FR</button>
                        <button onclick="setLanguage('nl')" class="lang-btn px-2 py-1 rounded" id="btn-nl">NL</button>
                        <button onclick="setLanguage('de')" class="lang-btn px-2 py-1 rounded" id="btn-de">DE</button>
                    </div>
                </div>
                <h1 id="txt-title" class="text-xl font-black text-gray-900 px-2 uppercase tracking-tighter">Screen Reader Experience</h1>
            </nav>
        </header>

        <main class="p-6 md:p-10">
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-16">
                <div class="lg:col-span-2">
                    <div id="form-container" class="flex flex-col">
                        <p id="txt-all-required" class="text-sm font-bold text-gray-600 mb-6 italic border-l-4 border-gray-300 pl-3">All fields are required.</p>
                        <div id="error-area"></div>
                        <div id="dynamic-form-area" class="space-y-6"></div>
                    </div>
                </div>

                <div class="lg:col-span-3">
                    <div class="info-panel-container bg-gray-900 text-white rounded-2xl shadow-xl overflow-hidden h-full flex flex-col">
                        <div class="flex bg-gray-800 border-b border-gray-700">
                            <button id="tab-test" onclick="switchTab('test')" class="tab-btn px-6 py-4 text-xs font-black uppercase tracking-widest" aria-selected="true">How to test</button>
                            <button id="tab-feedback" onclick="switchTab('feedback')" class="tab-btn px-6 py-4 text-xs font-black uppercase tracking-widest border-l border-gray-700" aria-selected="false">Issues</button>
                            <button id="tab-user" onclick="switchTab('user')" class="tab-btn px-6 py-4 text-xs font-black uppercase tracking-widest border-l border-gray-700" aria-selected="false">Impacted users</button>
                        </div>
                        <div id="panel-test" class="p-8 space-y-6 text-sm flex-grow overflow-y-auto">
                            <h3 id="txt-guide-title" class="text-blue-400 font-bold uppercase text-xs mb-2">Step-by-step guide</h3>
                            <ol id="txt-test-steps" class="list-decimal pl-5 space-y-4 opacity-95"></ol>
                        </div>
                        <div id="panel-feedback" class="p-8 hidden text-sm flex-grow overflow-y-auto">
                            <h3 id="txt-feedback-heading" class="text-blue-400 font-bold uppercase text-xs mb-4">What is wrong?</h3>
                            <div id="critiqueContent" class="space-y-6"></div>
                        </div>
                        <div id="panel-user" class="p-8 hidden text-sm flex-grow overflow-y-auto">
                            <h3 id="txt-user-heading" class="text-blue-400 font-bold uppercase text-xs mb-4">Who is impacted?</h3>
                            <div id="txt-user-content" class="leading-relaxed opacity-95 text-sm"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

                tabTest: "Testanleitung", tabIssues: "Probleme", tabRemediations: "Lösungen", tabUser: "Auswirkung",

        let currentLang = 'en';

        function renderForm() {
            const isAcc = document.getElementById('modeToggle').checked;
            const t = translations[currentLang] || translations['en'];
            const container = document.getElementById('dynamic-form-area');
            document.getElementById('error-area').innerHTML = "";
            
            if (isAcc) {
                container.innerHTML = `
                    <div class="space-y-6">
                        <div>
                            <label for="f-name" class="block mb-1 text-sm font-bold text-gray-700">${t.labelName}</label>
                            <input type="text" id="f-name" aria-required="true" class="w-full std-border p-2 rounded bg-gray-50 text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label for="f-email" class="block mb-1 text-sm font-bold text-gray-700">${t.labelEmail}</label>
                            <input type="text" id="f-email" aria-required="true" class="w-full std-border p-2 rounded bg-gray-50 text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                        </div>
                        <fieldset class="border border-gray-200 p-4 rounded">
                            <legend class="px-2 text-sm font-bold text-gray-700">${t.labelGender}</legend>
                            <div class="flex gap-4">
                                <label class="flex items-center text-sm"><input type="radio" name="g" value="m" class="mr-2"> ${t.optMale}</label>
                                <label class="flex items-center text-sm"><input type="radio" name="g" value="f" class="mr-2"> ${t.optFemale}</label>
                                <label class="flex items-center text-sm"><input type="radio" name="g" value="o" class="mr-2"> ${t.optOther}</label>
                            </div>
                        </fieldset>
                        <div class="flex items-center">
                            <input type="checkbox" id="f-terms" class="w-4 h-4 mr-2 border-black">
                            <label for="f-terms" class="text-sm font-medium text-gray-700 cursor-pointer">${t.agreeTerms}</label>
                        </div>
                        <button onclick="handleSubmit(true)" class="w-full bg-green-700 text-white font-bold py-3 rounded uppercase hover:bg-green-800">${t.btnText}</button>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="space-y-6">
                        <div>
                            <div class="text-sm font-bold text-gray-700 mb-1">${t.labelName}</div>
                            <input type="text" id="bad-name" class="w-full std-border p-2 rounded bg-gray-50 text-sm outline-none">
                        </div>
                        <div>
                            <div class="text-sm font-bold text-gray-700 mb-1">${t.labelEmail}</div>
                            <input type="text" id="bad-email" aria-label="${t.badEmailAria}" class="w-full std-border p-2 rounded bg-gray-50 text-sm outline-none">
                        </div>
                        <div class="std-border p-4 rounded relative mt-6">
                            <div class="absolute -top-3 left-2 bg-white px-2 text-sm font-bold text-gray-700">${t.labelGender}</div>
                            <div class="flex gap-4 pt-2">
                                <label class="flex items-center text-sm"><input type="radio" name="bg" value="m" class="mr-2"> ${t.optMale}</label>
                                <label class="flex items-center text-sm"><input type="radio" name="bg" value="f" class="mr-2"> ${t.optFemale}</label>
                                <label class="flex items-center text-sm"><input type="radio" name="bg" value="o" class="mr-2"> ${t.optOther}</label>
                            </div>
                        </div>
                        <div class="flex items-center">
                            <div id="custom-check" role="checkbox" tabindex="0" class="custom-cb mr-2" aria-labelledby="cb-label"></div>
                            <span id="cb-label" class="text-sm font-medium text-gray-700 cursor-pointer">${t.agreeTerms}</span>
                        </div>
                        <div tabindex="0" id="bad-btn" class="w-full bg-green-700 text-white font-bold py-3 rounded uppercase text-center cursor-pointer hover:bg-green-800 transition-colors">
                            ${t.btnText}
                        </div>
                    </div>
                `;
                setupBadFormListeners();
            }
        }

        function setupBadFormListeners() {
            const cb = document.getElementById('custom-check');
            const lbl = document.getElementById('cb-label');
            const btn = document.getElementById('bad-btn');
            if(!cb) return;
            const toggle = () => cb.classList.toggle('checked');
            cb.onclick = toggle; lbl.onclick = toggle;
            cb.onkeydown = (e) => { if (e.key === ' ') { e.preventDefault(); toggle(); } };
            btn.onclick = () => handleSubmit(false);
            btn.onkeydown = (e) => { if (e.key === 'Enter') handleSubmit(false); };
        }

        function handleSubmit(isAcc) {
            const t = translations[currentLang] || translations['en'];
            const email = isAcc ? document.getElementById('f-email').value : document.getElementById('bad-email').value;
            const name = isAcc ? document.getElementById('f-name').value : document.getElementById('bad-name').value;
            const cb = isAcc ? document.getElementById('f-terms').checked : document.getElementById('custom-check').classList.contains('checked');
            const gender = isAcc ? document.querySelector('input[name="g"]:checked') : document.querySelector('input[name="bg"]:checked');
            
            if (name && email.includes('@') && cb && gender) {
                document.getElementById('dynamic-form-area').innerHTML = `
                    <div ${isAcc ? 'role="status"' : ''} class="p-8 bg-green-50 border border-green-200 rounded text-green-900 text-center">
                        <p class="text-2xl mb-2">✅</p>
                        <p class="font-bold">${t.successMsg}</p>
                    </div>
                `;
                document.getElementById('error-area').innerHTML = "";
            } else {
                let errors = [];
                if (!name) errors.push(t.errNameReq);
                if (!email) errors.push(t.errEmailReq);
                else if (!email.includes('@')) errors.push(t.errEmailFormat);
                if (!gender) errors.push(t.errGenderReq);
                if (!cb) errors.push(t.errTermsReq);

                const errArea = document.getElementById('error-area');
                errArea.innerHTML = `
                    <div ${isAcc ? 'role="alert"' : ''} class="p-4 rounded border-2 border-red-300 bg-red-50 text-red-900 mb-6">
                        <p class="font-bold mb-2">${t.errHeader}</p>
                        <ul class="list-disc pl-5 text-sm space-y-1">
                            ${errors.map(e => `<li>${e}</li>`).join('')}
                        </ul>
                    </div>
                `;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang] || translations['en'];
            const isAcc = document.getElementById('modeToggle').checked;
            document.getElementById('txt-lab-title').innerText = t.labTitle;
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('txt-all-required').innerText = t.allRequired;
            document.getElementById('tab-test').innerText = t.tabTest;
            document.getElementById('tab-user').innerText = t.tabUser;
            document.getElementById('tab-feedback').innerText = isAcc ? t.tabRemediations : t.tabIssues;
            document.getElementById('txt-guide-title').innerText = t.guideTitle;
            document.getElementById('txt-feedback-heading').innerText = isAcc ? t.feedbackHeadingGood : t.feedbackHeadingBad;
            document.getElementById('txt-test-steps').innerHTML = t.testSteps.map(s => `<li>${s}</li>`).join('');
            const crit = isAcc ? t.critiques.good : t.critiques.bad;
            document.getElementById('critiqueContent').innerHTML = crit.map(i => `<div><span class="text-blue-400 font-bold block mb-1 uppercase text-[11px]">${i.f}</span><p class="text-white opacity-90">${i.c}</p></div>`).join('');
            document.getElementById('txt-user-content').innerHTML = `<ul class="list-disc pl-5 space-y-3">${t.userList.map(li => `<li>${li.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')}</li>`).join('')}</ul>`;
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.toggle('bg-blue-600', b.id === 'btn-' + lang);
                b.classList.toggle('text-white', b.id === 'btn-' + lang);
                b.classList.toggle('bg-gray-200', b.id !== 'btn-' + lang);
            });
            renderForm();
        }

        function handleModeToggle() { setLanguage(currentLang); }
        function switchTab(tabId) {
            ['test', 'feedback', 'user'].forEach(id => {
                document.getElementById('panel-' + id).classList.toggle('hidden', id !== tabId);
                document.getElementById('tab-' + id).setAttribute('aria-selected', id === tabId);
            });
        }
        setLanguage('en');
    </script>
</body>
</html>
