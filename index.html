<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Reader Experience - Digital Accessibility Empathy Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .lab-ui-font { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif !important; }
        .info-panel-container { min-height: 550px !important; display: flex; flex-direction: column; }
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ef4444; transition: .4s; border-radius: 28px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #15803d; }
        input:checked + .slider:before { transform: translateX(22px); }
        .tab-btn { font-family: ui-sans-serif, system-ui, sans-serif !important; }
        .tab-btn[aria-selected="true"] { background-color: #111827; color: #60a5fa; border-bottom: 2px solid #60a5fa; }
        /* Precise alignment for the fieldset/div border box */
        .gender-box { margin-top: 32px !important; min-height: 80px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 transition-colors duration-500 lab-ui-font" id="bodyTag">

    <div class="max-w-7xl mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden">
        <header class="bg-white border-b border-gray-100">
            <div class="p-6 flex flex-col md:flex-row justify-between items-center gap-6 border-b border-gray-50">
                <div id="txt-lab-title" class="text-xl md:text-2xl font-black tracking-tight uppercase" style="color: #008B63;">Digital Accessibility Empathy Lab</div>
                <img src="https://regine-lambrecht.github.io/color-contrast-checker-size-weight/images/banner.png" alt="Logo" class="h-12">
            </div>

            <nav class="p-4 flex flex-col gap-4">
                <div class="flex items-center justify-between gap-4 bg-gray-50 p-3 rounded-2xl border border-gray-200 w-full">
                    <div class="flex items-center gap-4">
                        <span id="txt-inaccessible" class="text-xs font-black uppercase tracking-widest text-red-600">Inaccessible</span>
                        <label class="switch">
                            <input type="checkbox" id="modeToggle" onchange="handleModeToggle()" role="switch">
                            <span class="slider"></span>
                        </label>
                        <span id="txt-accessible" class="text-xs font-black uppercase tracking-widest text-green-700">Accessible</span>
                    </div>
                    <div class="flex gap-2 text-[10px] font-bold">
                        <button onclick="setLanguage('en')" class="lang-btn px-2 py-1 rounded" id="btn-en">EN</button>
                        <button onclick="setLanguage('fr')" class="lang-btn px-2 py-1 rounded" id="btn-fr">FR</button>
                        <button onclick="setLanguage('nl')" class="lang-btn px-2 py-1 rounded" id="btn-nl">NL</button>
                        <button onclick="setLanguage('de')" class="lang-btn px-2 py-1 rounded" id="btn-de">DE</button>
                    </div>
                </div>
                <h1 id="txt-title" class="text-xl font-black text-gray-900 px-2 uppercase tracking-tighter">Screen Reader Experience</h1>
            </nav>
        </header>

        <main class="p-6 md:p-10">
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-16">
                <div class="lg:col-span-2 flex flex-col">
                    <div id="dynamic-form-area" class="space-y-6"></div>
                    <div id="status-message" aria-live="polite" class="hidden p-4 rounded-lg font-bold text-sm mt-6"></div>
                </div>

                <div class="lg:col-span-3">
                    <div class="info-panel-container bg-gray-900 text-white rounded-2xl shadow-xl overflow-hidden h-full flex flex-col">
                        <div class="flex bg-gray-800 border-b border-gray-700">
                            <button id="tab-test" onclick="switchTab('test')" class="tab-btn px-6 py-4 text-xs font-black uppercase tracking-widest" aria-selected="true">How to test</button>
                            <button id="tab-feedback" onclick="switchTab('feedback')" class="tab-btn px-6 py-4 text-xs font-black uppercase tracking-widest border-l border-gray-700" aria-selected="false">Issues</button>
                            <button id="tab-user" onclick="switchTab('user')" class="tab-btn px-6 py-4 text-xs font-black uppercase tracking-widest border-l border-gray-700" aria-selected="false">Impacted users</button>
                        </div>
                        <div id="panel-test" class="p-8 space-y-6 text-sm flex-grow overflow-y-auto">
                            <h3 id="txt-guide-title" class="text-blue-400 font-bold uppercase text-xs mb-2">Step-by-step guide</h3>
                            <ol id="txt-test-steps" class="list-decimal pl-5 space-y-4 opacity-95"></ol>
                        </div>
                        <div id="panel-feedback" class="p-8 hidden text-sm flex-grow overflow-y-auto">
                            <div id="critiqueContent" class="space-y-6"></div>
                        </div>
                        <div id="panel-user" class="p-8 hidden text-sm flex-grow overflow-y-auto">
                            <div id="txt-user-content" class="leading-relaxed opacity-95 text-sm"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const translations = {
            en: {
                labTitle: "Digital Accessibility Empathy Lab", title: "Screen Reader Experience",
                labelName: "Full Name", labelEmail: "Email Address", labelGender: "Gender",
                optMale: "Male", optFemale: "Female", optOther: "Other",
                agreeTerms: "I agree to the Terms and Privacy Policy", btnText: "Register Now",
                tabTest: "How to test", tabIssues: "Issues", tabRemediations: "Remediations", tabUser: "Impacted users",
                guideTitle: "Step-by-step guide",
                testSteps: ["Use a Screen Reader.", "Navigate with the Tab key.", "Notice if field names and the gender group question are announced.", "Check the 'Terms' checkbox to see if state is communicated.", "Switch to Accessible mode."],
                badEmailAria: "Instructions: Enter your work email address here using only lowercase letters and ensure it contains an @ symbol.",
                critiques: {
                    bad: { items: [
                        { f: "Disconnected Labels", c: "Visually labels are present, but the code doesn't link them to the inputs. Screen readers just say 'Edit text, blank'." },
                        { f: "No Radio Grouping", c: "Without a &lt;fieldset&gt;, the question 'Gender' is never read; the user hears options out of context." },
                        { f: "Silent Checkbox State", c: "The checkbox has role='presentation'. The screen reader won't announce if it is 'Checked' or 'Not checked'." },
                        { f: "Label Overwriting", c: "The email field uses an aria-label for instructions. This completely overwrites the visible label, so the screen reader never says 'Email Address'." }
                    ]},
                    good: { items: [
                        { f: "Semantic Linking", c: "Using &lt;label for='...'&gt; ensures the field name is always read on focus." },
                        { f: "Fieldsets & Legends", c: "Grouping related buttons with a &lt;legend&gt; provides vital context." },
                        { f: "Native Role & State", c: "Using a real input without overriding its role ensures state is announced." },
                        { f: "Accessible Descriptions", c: "Instructions are linked via aria-describedby so the label remains intact." }
                    ]}
                },
                userTitle: "Who is impacted?", userList: ["**Blind Users:** Rely on code relationships to understand purpose.", "**Screen Reader Users:** Experience frustration when state is silent.", "**Motor Impaired Users:** Software relies on semantic tags to click."],
                successMsg: "Success! You are registered."
            },
            fr: {
                labTitle: "Labo d'empathie sur l'accessibilité", title: "Expérience Lecteur d'écran",
                labelName: "Nom complet", labelEmail: "Adresse e-mail", labelGender: "Genre",
                optMale: "Homme", optFemale: "Femme", optOther: "Autre",
                agreeTerms: "J'accepte les conditions générales", btnText: "S'inscrire maintenant",
                tabTest: "Comment tester", tabIssues: "Problèmes", tabRemediations: "Corrections", tabUser: "Utilisateurs impactés",
                guideTitle: "Guide étape par étape",
                testSteps: ["Utilisez un lecteur d'écran.", "Naviguez avec Tab.", "Vérifiez si la question 'Genre' est annoncée.", "Cochez la case 'Conditions' pour tester l'annonce d'état.", "Passez en mode accessible."],
                badEmailAria: "Instructions : Entrez votre adresse e-mail professionnelle ici en minuscules et assurez-vous qu'elle contient un symbole @.",
                critiques: {
                    bad: { items: [
                        { f: "Libellés déconnectés", c: "Le code ne lie pas le texte aux champs. Le lecteur dit juste 'Zone de texte, vide'." },
                        { f: "Pas de groupe radio", c: "Sans &lt;fieldset&gt;, la question 'Genre' n'est jamais lue." },
                        { f: "État de case silencieux", c: "La case utilise role='presentation'. L'état coché/décoché n'est pas transmis." },
                        { f: "Écrasement d'étiquette", c: "Le champ e-mail utilise un aria-label pour les instructions, ce qui efface le nom du champ pour le lecteur." }
                    ]},
                    good: { items: [
                        { f: "Lien sémantique", c: "L'utilisation de &lt;label for='...'&gt; assure que le nom est lu." },
                        { f: "Fieldsets & Legends", c: "Le regroupement avec &lt;legend&gt; donne un contexte vital." },
                        { f: "Rôle et état natifs", c: "L'utilisation d'un vrai input assure que l'état est annoncé." },
                        { f: "Descriptions accessibles", c: "Les instructions sont liées via aria-describedby pour garder le libellé intact." }
                    ]}
                },
                userTitle: "Qui est impacté ?", userList: ["**Utilisateurs aveugles:** Dépendent des relations sémantiques.", "**Lecteurs d'écran:** Frustration quand l'état est inconnu.", "**Troubles moteurs:** Les logiciels utilisent ces balises."],
                successMsg: "Succès ! Vous êtes inscrit."
            },
            nl: {
                labTitle: "Toegankelijkheid Empathy Lab", title: "Schermlezer Ervaring",
                labelName: "Volledige Naam", labelEmail: "E-mailadres", labelGender: "Geslacht",
                optMale: "Man", optFemale: "Vrouw", optOther: "Anders",
                agreeTerms: "Ik ga akkoord met de voorwaarden", btnText: "Nu Registreren",
                tabTest: "Hoe te testen", tabIssues: "Problemen", tabRemediations: "Oplossingen", tabUser: "Impact op gebruikers",
                guideTitle: "Stappenplan",
                testSteps: ["Gebruik een schermlezer.", "Navigeer met Tab.", "Let op of de vraag 'Geslacht' wordt voorgelezen.", "Test of de checkbox zijn status doorgeeft.", "Schakel naar de toegankelijke modus."],
                badEmailAria: "Instructies: Voer hier uw zakelijke e-mailadres in met kleine letters en zorg dat er een @-teken in staat.",
                critiques: {
                    bad: { items: [
                        { f: "Losgekoppelde labels", c: "De code linkt tekst niet aan velden. De lezer zegt 'Tekstveld, leeg'." },
                        { f: "Geen radiogroepering", c: "Zonder &lt;fieldset&gt; wordt de vraag 'Geslacht' overgeslagen." },
                        { f: "Stille checkbox-status", c: "De checkbox heeft role='presentation'. Status wordt niet gemeld." },
                        { f: "Label Overschrijven", c: "Het e-mailveld gebruikt een aria-label voor instructies, waardoor de eigenlijke naam verdwijnt." }
                    ]},
                    good: { items: [
                        { f: "Semantische koppeling", c: "&lt;label for='...'&gt; zorgt dat de naam wordt voorgelezen." },
                        { f: "Fieldsets & Legends", c: "Groeperen met &lt;legend&gt; biedt essentieel context." },
                        { f: "Native rol & status", c: "Een echte checkbox handelt status automatisch af." },
                        { f: "Toegankelijke beschrijvingen", c: "Instructies zijn gekoppeld via aria-describedby." }
                    ]}
                },
                userTitle: "Wie wordt beïnvloed?", userList: ["**Blinde gebruikers:** Afhankelijk van code-relaties.", "**Schermlezer-gebruikers:** Frustratie als status ontbreekt.", "**Motorisch beperkten:** Software vertrouwt op tags."],
                successMsg: "Succes! U bent geregistreerd."
            },
            de: {
                labTitle: "Barrierefreiheits-Empathie-Labor", title: "Screenreader-Erfahrung",
                labelName: "Vollständiger Name", labelEmail: "E-Mail-Adresse", labelGender: "Geschlecht",
                optMale: "Männlich", optFemale: "Weiblich", optOther: "Andere",
                agreeTerms: "Ich stimme den Bedingungen zu", btnText: "Jetzt Registrieren",
                tabTest: "Wie man testet", tabIssues: "Probleme", tabRemediations: "Lösungen", tabUser: "Betroffene Nutzer",
                guideTitle: "Schritt-für-Schritt-Anleitung",
                testSteps: ["Nutzen Sie einen Screenreader.", "Navigieren Sie mit Tab.", "Prüfen Sie, ob die Frage 'Geschlecht' angesagt wird.", "Prüfen Sie den Status der Checkbox.", "Wechseln Sie in den barrierefreien Modus."],
                badEmailAria: "Anweisungen: Geben Sie hier Ihre geschäftliche E-Mail-Adresse in Kleinbuchstaben ein und stellen Sie sicher, dass sie ein @-Zeichen enthält.",
                critiques: {
                    bad: { items: [
                        { f: "Getrennte Beschriftungen", c: "Der Reader sagt nur 'Textfeld, leer', da die Verknüpfung fehlt." },
                        { f: "Keine Gruppierung", c: "Ohne &lt;fieldset&gt; wird die Frage 'Geschlecht' nicht vorgelesen." },
                        { f: "Stummer Checkbox-Status", c: "Die Checkbox nutzt role='presentation'. Status fehlt." },
                        { f: "Label Überschreiben", c: "Das E-Mail-Feld nutzt ein aria-label für Anweisungen, was den sichtbaren Namen überschreibt." }
                    ]},
                    good: { items: [
                        { f: "Semantische Verknüpfung", c: "&lt;label for='...'&gt; sorgt für die richtige Ansage." },
                        { f: "Fieldsets & Legends", c: "Gruppierung mit &lt;legend&gt; bietet Kontext." },
                        { f: "Native Rolle & Status", c: "Überträgt den Status automatisch." },
                        { f: "Barrierefreie Beschreibungen", c: "Anweisungen sind über aria-describedby verknüpft." }
                    ]}
                },
                userTitle: "Wer ist betroffen?", userList: ["**Blinde Nutzer:** Auf Code-Beziehungen angewiesen.", "**Screenreader-Nutzer:** Frustration bei fehlender Statusansage.", "**Motorisch eingeschränkte Nutzer:** Nutzen semantische Tags."],
                successMsg: "Erfolg! Sie sind registriert."
            }
        };

        let currentLang = 'en';

        function renderForm() {
            const isAcc = document.getElementById('modeToggle').checked;
            const t = translations[currentLang] || translations['en'];
            const container = document.getElementById('dynamic-form-area');
            
            if (isAcc) {
                container.innerHTML = `
                    <div>
                        <label for="acc-name" class="block mb-1 text-sm font-bold text-gray-700">${t.labelName}</label>
                        <input type="text" id="acc-name" class="w-full border border-gray-300 p-2 rounded-lg bg-gray-50 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                    <div>
                        <label for="acc-email" class="block mb-1 text-sm font-bold text-gray-700">${t.labelEmail}</label>
                        <input type="email" id="acc-email" class="w-full border border-gray-300 p-2 rounded-lg bg-gray-50 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                    <fieldset class="border border-gray-200 p-4 rounded-lg gender-box">
                        <legend class="px-2 text-sm font-bold text-gray-700">${t.labelGender}</legend>
                        <div class="flex gap-4">
                            <label class="flex items-center text-sm cursor-pointer"><input type="radio" name="gender" class="mr-2"> ${t.optMale}</label>
                            <label class="flex items-center text-sm cursor-pointer"><input type="radio" name="gender" class="mr-2"> ${t.optFemale}</label>
                            <label class="flex items-center text-sm cursor-pointer"><input type="radio" name="gender" class="mr-2"> ${t.optOther}</label>
                        </div>
                    </fieldset>
                    <div class="flex items-center">
                        <input type="checkbox" id="acc-terms" class="w-4 h-4 mr-2">
                        <label for="acc-terms" class="text-sm font-medium text-gray-700">${t.agreeTerms}</label>
                    </div>
                    <button onclick="validateForm()" class="w-full bg-green-700 text-white font-bold py-3 rounded-lg uppercase hover:bg-green-800 transition-colors">${t.btnText}</button>
                `;
            } else {
                container.innerHTML = `
                    <div>
                        <div class="text-sm font-bold text-gray-700 mb-1">${t.labelName}</div>
                        <input type="text" class="w-full border border-gray-300 p-2 rounded-lg bg-gray-50 text-sm focus:outline-none">
                    </div>
                    <div>
                        <div class="text-sm font-bold text-gray-700 mb-1">${t.labelEmail}</div>
                        <input type="text" aria-label="${t.badEmailAria}" class="w-full border border-gray-300 p-2 rounded-lg bg-gray-50 text-sm focus:outline-none">
                    </div>
                    <div class="border border-gray-200 p-4 pt-6 rounded-lg gender-box relative">
                        <div class="absolute -top-3 left-2 bg-white px-2 text-sm font-bold text-gray-700">${t.labelGender}</div>
                        <div class="flex gap-4">
                            <div class="flex items-center text-sm"><input type="radio" name="bad-gender" class="mr-2"> ${t.optMale}</div>
                            <div class="flex items-center text-sm"><input type="radio" name="bad-gender" class="mr-2"> ${t.optFemale}</div>
                            <div class="flex items-center text-sm"><input type="radio" name="bad-gender" class="mr-2"> ${t.optOther}</div>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <input type="checkbox" role="presentation" class="w-4 h-4 mr-2">
                        <span class="text-sm font-medium text-gray-700">${t.agreeTerms}</span>
                    </div>
                    <button onclick="validateForm()" class="w-full bg-green-700 text-white font-bold py-3 rounded-lg uppercase">${t.btnText}</button>
                `;
            }
        }

        function validateForm() {
            const status = document.getElementById('status-message');
            const t = translations[currentLang] || translations['en'];
            status.innerText = t.successMsg;
            status.className = "p-4 rounded-lg font-bold text-sm mt-6 bg-green-100 text-green-700 block";
        }

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang] || translations['en'];
            const isAcc = document.getElementById('modeToggle').checked;
            document.getElementById('txt-lab-title').innerText = t.labTitle;
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('tab-test').innerText = t.tabTest;
            document.getElementById('tab-user').innerText = t.tabUser;
            document.getElementById('tab-feedback').innerText = isAcc ? t.tabRemediations : t.tabIssues;
            document.getElementById('txt-guide-title').innerText = t.guideTitle;
            document.getElementById('txt-test-steps').innerHTML = t.testSteps.map(s => `<li>${s}</li>`).join('');
            const crit = isAcc ? t.critiques.good : t.critiques.bad;
            document.getElementById('critiqueContent').innerHTML = crit.items.map(i => `<div><span class="text-blue-400 font-bold block mb-1 uppercase text-[11px]">${i.f}</span><p class="text-white opacity-90">${i.c}</p></div>`).join('');
            document.getElementById('txt-user-content').innerHTML = `
                <h3 class="text-blue-400 font-bold uppercase mb-4 text-xs">${t.userTitle}</h3>
                <ul class="list-disc pl-5 space-y-3">${t.userList.map(li => `<li>${li.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')}</li>`).join('')}</ul>
            `;
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white', 'bg-gray-200', 'text-gray-700');
                if (b.id === 'btn-' + lang) b.classList.add('bg-blue-600', 'text-white');
                else b.classList.add('bg-gray-200', 'text-gray-700');
            });
            renderForm();
        }

        function handleModeToggle() { setLanguage(currentLang); }
        function switchTab(tabId) {
            ['test', 'feedback', 'user'].forEach(id => {
                document.getElementById('panel-' + id).classList.toggle('hidden', id !== tabId);
                document.getElementById('tab-' + id).setAttribute('aria-selected', id === tabId);
            });
        }
        setLanguage('en');
    </script>
</body>
</html>
